name: Main Branch Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build (skip tests)
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.sha }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 90

      - name: Check coverage (≥ 90%)
        run: mvn jacoco:check

      - name: Generate coverage report
        if: always()
        id: coverage
        uses: ./.github/actions/coverage-report

      - name: Save coverage summary
        if: always()
        run: |
          echo "# Code Coverage Summary" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "${{ steps.coverage.outputs.report }}" >> coverage-summary.md

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-${{ github.sha }}
          path: coverage-summary.md
          retention-days: 90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ github.sha }}
          path: '**/target/site/jacoco/'
          retention-days: 90
